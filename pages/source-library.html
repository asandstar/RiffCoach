<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材库 — String Practice Compass</title>
    <style id="theme-vars">
:root {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-primary-light: rgba(184, 156, 212, 0.20);
  --color-primary-subtle: rgba(184, 156, 212, 0.08);
  --gradient-primary: linear-gradient(135deg, #C4A4D7 0%, #8BA4C7 100%);
  --color-warm-cream: #F5E6D0;
  --color-warm-cream-light: rgba(245, 230, 208, 0.25);
  --color-mint: #B8D8C8;
  --color-mint-light: rgba(184, 216, 200, 0.25);
  --color-lavender: #D4C4E8;
  --color-lavender-light: rgba(212, 196, 232, 0.30);
  --color-amber-soft: #F0D8A8;
  --color-amber-soft-light: rgba(240, 216, 168, 0.30);
  --color-rose-soft: #E8B8C4;
  --color-rose-soft-light: rgba(232, 184, 196, 0.30);
  --gradient-electric: linear-gradient(135deg, #FFF5E6 0%, #F0D8A8 100%);
  --gradient-acoustic: linear-gradient(135deg, #F0FAF5 0%, #B8D8C8 100%);
  --gradient-ukulele: linear-gradient(135deg, #F5F0FF 0%, #D4C4E8 100%);
  --state-error: #D4788A;
  --state-error-light: rgba(212, 120, 138, 0.18);
  --state-success: #7EBCA6;
  --state-success-light: rgba(126, 188, 166, 0.18);
  --state-warning: #E8C87A;
  --state-info: #8BA4C7;
  --bg-base: #F0EEF5;
  --bg-surface: rgba(255, 255, 255, 0.55);
  --bg-surface-elevated: rgba(255, 255, 255, 0.72);
  --bg-input: rgba(255, 255, 255, 0.60);
  --border-default: rgba(184, 156, 212, 0.20);
  --border-subtle: rgba(184, 156, 212, 0.10);
  --text-primary: #4A3F5C;
  --text-secondary: #7B6E94;
  --text-tertiary: #A99BBF;
  --text-on-primary: #FFFFFF;
  --font-sans: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-display: 4rem;
  --leading-tight: 1.3;
  --leading-normal: 1.55;
  --leading-relaxed: 1.7;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;
  --tracking-tight: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.03em;
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-blur: blur(16px);
  --glass-border: 1px solid rgba(255, 255, 255, 0.35);
  --shadow-static: 0 2px 8px rgba(74, 63, 92, 0.06);
  --shadow-elevated: 0 8px 24px rgba(74, 63, 92, 0.10);
  --shadow-float: 0 12px 32px rgba(74, 63, 92, 0.14);
  --shadow-glow: 0 4px 20px rgba(184, 156, 212, 0.20);
  --transition-fast: 200ms ease-out;
  --transition-base: 300ms ease-out;
  --transition-slow: 500ms ease-out;
}

@theme inline {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-background: #F0EEF5;
  --color-foreground: #4A3F5C;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: #ffffff; color: #0f172a; }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
<!-- App Frame -->
<div class="min-h-screen pb-[72px]" style="background: var(--bg-base);">

  <!-- SLOT: pageContent -->
  <div class="page-content">

    <!-- Page Header -->
    <header class="px-4 pt-5 pb-2">
      <h1 class="spc-title" style="font-size: var(--text-2xl); line-height: var(--leading-tight); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">素材库</h1>
      <p style="font-family: var(--font-sans); font-size: var(--text-sm); color: var(--text-secondary); margin-top: var(--space-1);">管理你的练习来源</p>
    </header>

    <!-- Category Tabs -->
    <nav class="px-4 pt-3 pb-4" aria-label="来源分类">
      <div class="flex flex-wrap gap-2">
        <button data-dom-id="tab-all" class="inline-flex items-center justify-center" style="background: var(--gradient-primary); color: var(--text-on-primary); border-radius: var(--radius-full); padding: 10px 18px; font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-semibold); transition: background var(--transition-base), color var(--transition-base), box-shadow var(--transition-base); box-shadow: var(--shadow-glow);">全部</button>
        <button data-dom-id="tab-bilibili" class="inline-flex items-center justify-center" style="background: var(--glass-bg); color: var(--text-secondary); border: var(--glass-border); border-radius: var(--radius-full); padding: 10px 18px; font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-medium); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); transition: background var(--transition-base), color var(--transition-base), box-shadow var(--transition-base);">B站</button>
        <button data-dom-id="tab-youtube" class="inline-flex items-center justify-center" style="background: var(--glass-bg); color: var(--text-secondary); border: var(--glass-border); border-radius: var(--radius-full); padding: 10px 18px; font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-medium); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); transition: background var(--transition-base), color var(--transition-base), box-shadow var(--transition-base);">YouTube</button>
        <button data-dom-id="tab-book" class="inline-flex items-center justify-center" style="background: var(--glass-bg); color: var(--text-secondary); border: var(--glass-border); border-radius: var(--radius-full); padding: 10px 18px; font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-medium); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); transition: background var(--transition-base), color var(--transition-base), box-shadow var(--transition-base);">教程书</button>
        <button data-dom-id="tab-score" class="inline-flex items-center justify-center" style="background: var(--glass-bg); color: var(--text-secondary); border: var(--glass-border); border-radius: var(--radius-full); padding: 10px 18px; font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-medium); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); transition: background var(--transition-base), color var(--transition-base), box-shadow var(--transition-base);">曲谱</button>
      </div>
    </nav>

    <!-- Source Cards -->
    <div class="px-4 flex flex-col gap-4">

      <!-- Card 1: JustinGuitar 和弦课程 (YouTube) — Expanded -->
      <div class="source-card" style="background: var(--glass-bg); border: var(--glass-border); border-radius: var(--radius-lg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); box-shadow: var(--shadow-elevated); overflow: hidden; transition: box-shadow var(--transition-base);">
        <!-- Collapsed Header -->
        <button class="w-full flex items-center justify-between px-4 py-3.5 gap-2" style="background: transparent; border: none; cursor: pointer; transition: background var(--transition-base);" aria-expanded="true" aria-label="展开 JustinGuitar 和弦课程">
          <div class="flex items-center gap-2.5 min-w-0 flex-1">
            <span class="spc-mono shrink-0" style="font-size: var(--text-xs); padding: 2px 8px; background: var(--color-lavender-light); color: #7B6E94; border-radius: var(--radius-full); white-space: nowrap;">YouTube</span>
            <span class="truncate" style="font-family: var(--font-sans); font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text-primary);">JustinGuitar 和弦课程</span>
          </div>
          <span class="shrink-0" style="font-family: var(--font-sans); font-size: var(--text-xs); font-weight: var(--weight-semibold); padding: 2px 10px; background: var(--gradient-primary); color: var(--text-on-primary); border-radius: var(--radius-full); white-space: nowrap;">12 个课程</span>
          <svg class="chevron-icon shrink-0" style="width: 18px; height: 18px; color: var(--text-tertiary); transition: transform var(--transition-base); transform: rotate(180deg);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </button>
        <!-- Expanded Lessons -->
        <div class="lessons-list" style="border-top: 1px solid var(--border-subtle);">
          <!-- Lesson 1 -->
          <a href="#" data-dom-id="lesson-to-practice" class="flex items-center justify-between px-4 py-3 gap-2" style="border-left: 3px solid var(--color-amber-soft); background: transparent; text-decoration: none; transition: background var(--transition-fast);" aria-label="练习 Open Chord Practice">
            <div class="flex flex-col gap-1.5 min-w-0 flex-1">
              <span class="truncate" style="font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary);">Open Chord Practice</span>
              <div class="flex items-center gap-1.5 flex-wrap">
                <span style="font-family: var(--font-sans); font-size: 11px; padding: 2px 8px; background: var(--color-lavender-light); color: #7B6E94; border-radius: var(--radius-full); white-space: nowrap;">和弦</span>
              </div>
            </div>
            <div class="flex flex-col items-end shrink-0 gap-1">
              <span class="spc-mono" style="font-size: var(--text-xs); color: var(--color-primary); font-variant-numeric: tabular-nums; white-space: nowrap;">BPM:80</span>
              <span style="font-family: var(--font-sans); font-size: 11px; color: var(--text-tertiary); white-space: nowrap;">2天前</span>
            </div>
          </a>
          <!-- Lesson 2 -->
          <a href="#" data-dom-id="lesson-to-practice" class="flex items-center justify-between px-4 py-3 gap-2" style="border-left: 3px solid var(--color-amber-soft); background: transparent; text-decoration: none; transition: background var(--transition-fast);" aria-label="练习 Chord Transitions">
            <div class="flex flex-col gap-1.5 min-w-0 flex-1">
              <span class="truncate" style="font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary);">Chord Transitions</span>
              <div class="flex items-center gap-1.5 flex-wrap">
                <span style="font-family: var(--font-sans); font-size: 11px; padding: 2px 8px; background: var(--color-lavender-light); color: #7B6E94; border-radius: var(--radius-full); white-space: nowrap;">转换</span>
                <span style="font-family: var(--font-sans); font-size: 11px; padding: 2px 8px; background: var(--color-mint-light); color: #6B9E84; border-radius: var(--radius-full); white-space: nowrap;">节奏</span>
              </div>
            </div>
            <div class="flex flex-col items-end shrink-0 gap-1">
              <span class="spc-mono" style="font-size: var(--text-xs); color: var(--color-primary); font-variant-numeric: tabular-nums; white-space: nowrap;">BPM:90</span>
              <span style="font-family: var(--font-sans); font-size: 11px; color: var(--text-tertiary); white-space: nowrap;">昨天</span>
            </div>
          </a>
          <!-- Lesson 3 -->
          <a href="#" data-dom-id="lesson-to-practice" class="flex items-center justify-between px-4 py-3 gap-2" style="border-left: 3px solid var(--color-amber-soft); background: transparent; text-decoration: none; transition: background var(--transition-fast);" aria-label="练习 Barre Chord Basics">
            <div class="flex flex-col gap-1.5 min-w-0 flex-1">
              <span class="truncate" style="font-family: var(--font-sans); font-size: var(--text-sm); font-weight: var(--weight-medium); color: var(--text-primary);">Barre Chord Basics</span>
              <div class="flex items-center gap-1.5 flex-wrap">
                <span style="font-family: var(--font-sans); font-size: 11px; padding: 2px 8px; background: var(--color-rose-soft-light); color: #9E6E7A; border-radius: var(--radius-full); white-space: nowrap;">大横按</span>
              </div>
            </div>
            <div class="flex flex-col items-end shrink-0 gap-1">
              <span class="spc-mono" style="font-size: var(--text-xs); color: var(--color-primary); font-variant-numeric: tabular-nums; white-space: nowrap;">BPM:60</span>
              <span style="font-family: var(--font-sans); font-size: 11px; color: var(--text-tertiary); white-space: nowrap;">今天</span>
            </div>
          </a>
        </div>
      </div>

      <!-- Card 2: 小林信一 摇滚吉他 (教程书) — Collapsed -->
      <div class="source-card" style="background: var(--glass-bg); border: var(--glass-border); border-radius: var(--radius-lg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); box-shadow: var(--shadow-elevated); overflow: hidden; transition: box-shadow var(--transition-base);">
        <button class="w-full flex items-center justify-between px-4 py-3.5 gap-2" style="background: transparent; border: none; cursor: pointer; transition: background var(--transition-base);" aria-expanded="false" aria-label="展开 小林信一 摇滚吉他">
          <div class="flex items-center gap-2.5 min-w-0 flex-1">
            <span class="spc-mono shrink-0" style="font-size: var(--text-xs); padding: 2px 8px; background: var(--color-warm-cream-light); color: #8B7355; border-radius: var(--radius-full); white-space: nowrap;">教程书</span>
            <span class="truncate" style="font-family: var(--font-sans); font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text-primary);">小林信一 摇滚吉他</span>
          </div>
          <span class="shrink-0" style="font-family: var(--font-sans); font-size: var(--text-xs); font-weight: var(--weight-semibold); padding: 2px 10px; background: var(--gradient-primary); color: var(--text-on-primary); border-radius: var(--radius-full); white-space: nowrap;">8 个课程</span>
          <svg class="chevron-icon shrink-0" style="width: 18px; height: 18px; color: var(--text-tertiary); transition: transform var(--transition-base); transform: rotate(0deg);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </button>
      </div>

      <!-- Card 3: 押尾コータロー 指弹合集 (B站) — Collapsed -->
      <div class="source-card" style="background: var(--glass-bg); border: var(--glass-border); border-radius: var(--radius-lg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); box-shadow: var(--shadow-elevated); overflow: hidden; transition: box-shadow var(--transition-base);">
        <button class="w-full flex items-center justify-between px-4 py-3.5 gap-2" style="background: transparent; border: none; cursor: pointer; transition: background var(--transition-base);" aria-expanded="false" aria-label="展开 押尾コータロー 指弹合集">
          <div class="flex items-center gap-2.5 min-w-0 flex-1">
            <span class="spc-mono shrink-0" style="font-size: var(--text-xs); padding: 2px 8px; background: var(--color-mint-light); color: #5E9476; border-radius: var(--radius-full); white-space: nowrap;">B站</span>
            <span class="truncate" style="font-family: var(--font-sans); font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text-primary);">押尾コータロー 指弹合集</span>
          </div>
          <span class="shrink-0" style="font-family: var(--font-sans); font-size: var(--text-xs); font-weight: var(--weight-semibold); padding: 2px 10px; background: var(--gradient-primary); color: var(--text-on-primary); border-radius: var(--radius-full); white-space: nowrap;">5 个课程</span>
          <svg class="chevron-icon shrink-0" style="width: 18px; height: 18px; color: var(--text-tertiary); transition: transform var(--transition-base); transform: rotate(0deg);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </button>
      </div>

    </div>

  </div>

</div>

<!-- FAB Button -->
<button data-dom-id="fab-add" class="fixed z-40 inline-flex items-center justify-center" style="bottom: 88px; right: 16px; width: 56px; height: 56px; background: var(--gradient-primary); color: var(--text-on-primary); border-radius: var(--radius-full); box-shadow: var(--shadow-glow); border: none; cursor: pointer; transition: transform var(--transition-base), box-shadow var(--transition-base); transform: scale(1);" aria-label="添加来源" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'" onmouseleave="this.style.transform='scale(1)'">
  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
</button>

<!-- Bottom Tab Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50" style="background: var(--bg-surface-elevated); border-top: 1px solid var(--border-subtle); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding-bottom: env(safe-area-inset-bottom);">
  <div class="flex items-center justify-around h-[56px] max-w-[480px] mx-auto">

    <!-- 工作台 (Dashboard) -->
    <button
      class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
      style="transition: color var(--transition-base);"
      data-nav-key="dashboard"
      data-dom-id="nav-dashboard"
      data-active="false"
    >
      <svg class="w-6 h-6" style="transition: color var(--transition-base);" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z" />
      </svg>
      <span style="font-size: var(--text-xs); transition: color var(--transition-base);">工作台</span>
    </button>

    <!-- 素材库 (Source Library) — Active -->
    <button
      class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
      style="transition: color var(--transition-base);"
      data-nav-key="source-library"
      data-active="true"
    >
      <svg class="w-6 h-6" style="transition: color var(--transition-base);" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
      </svg>
      <span style="font-size: var(--text-xs); transition: color var(--transition-base);">素材库</span>
    </button>

    <!-- 周复盘 (Weekly Review) -->
    <button
      class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
      style="transition: color var(--transition-base);"
      data-nav-key="weekly-review"
      data-dom-id="nav-review"
      data-active="false"
    >
      <svg class="w-6 h-6" style="transition: color var(--transition-base);" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">

<!-- Styles -->
<style>
  /* Bottom tab active/inactive state */
  [data-nav-key] svg,
  [data-nav-key] span {
    color: var(--text-tertiary);
  }
  [data-nav-key][data-active="true"] svg,
  [data-nav-key][data-active="true"] span {
    color: var(--color-primary);
  }

  /* Lesson row hover */
  a[data-dom-id="lesson-to-practice"]:hover {
    background: var(--bg-surface-elevated);
  }

  /* Source card header hover */
  .source-card button[aria-expanded]:hover {
    background: var(--bg-surface-elevated);
  }

  /* FAB focus-visible */
  button[data-dom-id="fab-add"]:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  /* Tab focus-visible */
  nav[aria-label="来源分类"] button:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  /* Bottom nav focus-visible */
  [data-nav-key]:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: -2px;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }

  /* Lesson link press feedback */
  a[data-dom-id="lesson-to-practice"]:active {
    opacity: 0.8;
  }

  /* Card header press feedback */
  .source-card button[aria-expanded]:active {
    opacity: 0.8;
  }

  /* Source card subtle hover lift */
  .source-card:hover {
    box-shadow: var(--shadow-float);
  }
</style>
