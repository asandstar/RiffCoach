<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台空状态</title>
    <style id="theme-vars">
:root {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-primary-light: rgba(184, 156, 212, 0.20);
  --color-primary-subtle: rgba(184, 156, 212, 0.08);
  --gradient-primary: linear-gradient(135deg, #C4A4D7 0%, #8BA4C7 100%);
  --color-warm-cream: #F5E6D0;
  --color-warm-cream-light: rgba(245, 230, 208, 0.25);
  --color-mint: #B8D8C8;
  --color-mint-light: rgba(184, 216, 200, 0.25);
  --color-lavender: #D4C4E8;
  --color-lavender-light: rgba(212, 196, 232, 0.30);
  --color-amber-soft: #F0D8A8;
  --color-amber-soft-light: rgba(240, 216, 168, 0.30);
  --color-rose-soft: #E8B8C4;
  --color-rose-soft-light: rgba(232, 184, 196, 0.30);
  --gradient-electric: linear-gradient(135deg, #FFF5E6 0%, #F0D8A8 100%);
  --gradient-acoustic: linear-gradient(135deg, #F0FAF5 0%, #B8D8C8 100%);
  --gradient-ukulele: linear-gradient(135deg, #F5F0FF 0%, #D4C4E8 100%);
  --state-error: #D4788A;
  --state-error-light: rgba(212, 120, 138, 0.18);
  --state-success: #7EBCA6;
  --state-success-light: rgba(126, 188, 166, 0.18);
  --state-warning: #E8C87A;
  --state-info: #8BA4C7;
  --bg-base: #F0EEF5;
  --bg-surface: rgba(255, 255, 255, 0.55);
  --bg-surface-elevated: rgba(255, 255, 255, 0.72);
  --bg-input: rgba(255, 255, 255, 0.60);
  --border-default: rgba(184, 156, 212, 0.20);
  --border-subtle: rgba(184, 156, 212, 0.10);
  --text-primary: #4A3F5C;
  --text-secondary: #7B6E94;
  --text-tertiary: #A99BBF;
  --text-on-primary: #FFFFFF;
  --font-sans: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-display: 4rem;
  --leading-tight: 1.3;
  --leading-normal: 1.55;
  --leading-relaxed: 1.7;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;
  --tracking-tight: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.03em;
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-blur: blur(16px);
  --glass-border: 1px solid rgba(255, 255, 255, 0.35);
  --shadow-static: 0 2px 8px rgba(74, 63, 92, 0.06);
  --shadow-elevated: 0 8px 24px rgba(74, 63, 92, 0.10);
  --shadow-float: 0 12px 32px rgba(74, 63, 92, 0.14);
  --shadow-glow: 0 4px 20px rgba(184, 156, 212, 0.20);
  --transition-fast: 200ms ease-out;
  --transition-base: 300ms ease-out;
  --transition-slow: 500ms ease-out;
}

@theme inline {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-background: #F0EEF5;
  --color-foreground: #4A3F5C;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: #ffffff; color: #0f172a; }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="background-color: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans);">

  <main id="page-dashboard-empty" class="min-h-screen pb-[72px]">

    <!-- Minimal top bar -->
    <header class="flex items-center px-5 pt-[env(safe-area-inset-top,12px)]" style="padding-top: 16px; height: 44px;">
      <span style="font-size: var(--text-xs); color: var(--text-tertiary); letter-spacing: var(--tracking-wide); font-weight: var(--weight-medium);">String Practice Compass</span>
    </header>

    <!-- Centered empty state content -->
    <section class="flex flex-col items-center justify-center px-6" style="min-height: calc(100vh - 44px - 72px);">

      <!-- Kawaii CSS Guitar Illustration — soft gradient outline -->
      <div class="relative flex items-center justify-center" style="width: 140px; height: 200px; margin-bottom: var(--space-8);">

        <!-- Soft lavender glow behind guitar -->
        <div style="
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -45%);
          width: 120px;
          height: 120px;
          background: radial-gradient(circle, var(--color-primary-light) 0%, transparent 70%);
          border-radius: 50%;
          filter: blur(20px);
        "></div>

        <!-- Guitar body -->
        <div class="relative" style="width: 90px; height: 120px;">
          <!-- Upper bout -->
          <div class="guitar-circle" style="
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 2.5px;
          "></div>
          <!-- Lower bout (larger) -->
          <div class="guitar-circle" style="
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 78px;
            height: 78px;
            border-radius: 50%;
            margin: 2.5px;
          "></div>
          <!-- Waist connector -->
          <div style="
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 38px;
            border-left: 2.5px solid var(--color-primary);
            border-right: 2.5px solid var(--color-primary);
            background: transparent;
          "></div>
          <!-- Sound hole -->
          <div style="
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            background: var(--color-primary-subtle);
            box-shadow: var(--shadow-glow);
          "></div>
          <!-- Bridge -->
          <div style="
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 3px;
            background: var(--gradient-primary);
            border-radius: 2px;
          "></div>
          <!-- Kawaii face on sound hole -->
          <div style="
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
          ">
            <div style="
              position: absolute;
              top: 0;
              left: 0;
              width: 3px;
              height: 3px;
              border-radius: 50%;
              background: var(--color-primary);
            "></div>
            <div style="
              position: absolute;
              top: 0;
              right: 0;
              width: 3px;
              height: 3px;
              border-radius: 50%;
              background: var(--color-primary);
            "></div>
            <!-- Blush left -->
            <div style="
              position: absolute;
              bottom: -4px;
              left: -4px;
              width: 6px;
              height: 3px;
              border-radius: 50%;
              background: var(--color-rose-soft-light);
            "></div>
            <!-- Blush right -->
            <div style="
              position: absolute;
              bottom: -4px;
              right: -4px;
              width: 6px;
              height: 3px;
              border-radius: 50%;
              background: var(--color-rose-soft-light);
            "></div>
          </div>
        </div>

        <!-- Neck -->
        <div style="
          position: absolute;
          top: 0;
          left: 50%;
          transform: translateX(-50%) translateY(-36px);
          width: 14px;
          height: 48px;
          border: 2.5px solid var(--color-primary);
          border-radius: 4px 4px 0 0;
          background: var(--glass-bg);
          backdrop-filter: var(--glass-blur);
        "></div>

        <!-- Headstock -->
        <div style="
          position: absolute;
          top: 0;
          left: 50%;
          transform: translateX(-50%) translateY(-64px);
          width: 18px;
          height: 22px;
          border: 2.5px solid var(--color-primary);
          border-radius: 8px 8px 2px 2px;
          background: var(--glass-bg);
          backdrop-filter: var(--glass-blur);
        "></div>

        <!-- Tuning pegs (left) -->
        <div style="
          position: absolute;
          top: -60px;
          left: calc(50% - 14px);
          width: 5px;
          height: 3px;
          background: var(--color-primary);
          border-radius: 2px;
          opacity: 0.6;
        "></div>
        <div style="
          position: absolute;
          top: -53px;
          left: calc(50% - 14px);
          width: 5px;
          height: 3px;
          background: var(--color-primary);
          border-radius: 2px;
          opacity: 0.6;
        "></div>

        <!-- Tuning pegs (right) -->
        <div style="
          position: absolute;
          top: -60px;
          right: calc(50% - 14px);
          width: 5px;
          height: 3px;
          background: var(--color-primary);
          border-radius: 2px;
          opacity: 0.6;
        "></div>
        <div style="
          position: absolute;
          top: -53px;
          right: calc(50% - 14px);
          width: 5px;
          height: 3px;
          background: var(--color-primary);
          border-radius: 2px;
          opacity: 0.6;
        "></div>

        <!-- Strings -->
        <div style="
          position: absolute;
          top: -42px;
          left: calc(50% + 2px);
          width: 1px;
          height: 146px;
          background: linear-gradient(to bottom, var(--border-subtle), var(--color-primary-light) 30%, var(--color-primary-light) 70%, var(--border-subtle));
        "></div>
        <div style="
          position: absolute;
          top: -42px;
          left: calc(50% - 2px);
          width: 1px;
          height: 146px;
          background: linear-gradient(to bottom, var(--border-subtle), var(--color-primary-light) 30%, var(--color-primary-light) 70%, var(--border-subtle));
        "></div>

        <!-- Soft glow beneath -->
        <div style="
          position: absolute;
          bottom: -12px;
          left: 50%;
          transform: translateX(-50%);
          width: 80px;
          height: 16px;
          background: radial-gradient(ellipse, var(--color-primary-light) 0%, transparent 70%);
          border-radius: 50%;
          filter: blur(10px);
        "></div>

        <!-- Musical notes floating (kawaii touch) -->
        <div style="
          position: absolute;
          top: -28px;
          right: calc(50% - 42px);
          font-size: 14px;
          color: var(--color-primary);
          opacity: 0.5;
        ">&#9834;</div>
        <div style="
          position: absolute;
          top: -16px;
          left: calc(50% - 46px);
          font-size: 11px;
          color: var(--color-lavender);
          opacity: 0.4;
        ">&#9835;</div>
      </div>

      <!-- Heading -->
      <h1
        class="text-center"
        style="
          font-size: var(--text-xl);
          font-weight: var(--weight-bold);
          color: var(--text-primary);
          letter-spacing: var(--tracking-tight);
          line-height: var(--leading-tight);
          margin-bottom: var(--space-2);
          text-wrap: balance;
          word-break: keep-all;
        "
      >开始你的练习之旅</h1>

      <!-- Subtitle -->
      <p
        class="text-center"
        style="
          font-size: var(--text-sm);
          color: var(--text-secondary);
          line-height: var(--leading-relaxed);
          max-width: 260px;
          margin-bottom: var(--space-10);
        "
      >添加你的第一个练习来源，开启音乐冒险~</p>

      <!-- CTA Button — gradient-primary pill -->
      <a
        href="pages/source-library.html"
        id="cta-add-source"
        data-dom-id="cta-add-source"
        class="inline-flex items-center justify-center whitespace-nowrap focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2"
        style="
          width: 100%;
          max-width: 280px;
          height: 48px;
          background: var(--gradient-primary);
          color: var(--text-on-primary);
          font-size: var(--text-base);
          font-weight: var(--weight-semibold);
          border-radius: var(--radius-full);
          outline-color: var(--color-primary);
          letter-spacing: var(--tracking-normal);
          box-shadow: var(--shadow-glow);
          transition: transform var(--transition-fast), box-shadow var(--transition-base);
        "
        role="button"
        onmouseenter="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 28px rgba(184, 156, 212, 0.30)'"
        onmouseleave="this.style.transform=''; this.style.boxShadow='var(--shadow-glow)'"
        onmousedown="this.style.transform='scale(0.98)'"
        onmouseup="this.style.transform=''"
      >添加第一个练习来源</a>

    </section>

  </main>

  <!-- Bottom Tab Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 z-50" style="background: var(--bg-surface-elevated); backdrop-filter: var(--glass-blur); border-top: var(--glass-border); padding-bottom: env(safe-area-inset-bottom);">
    <div class="flex items-center justify-around h-[60px] max-w-[480px] mx-auto">

      <!-- SLOT: activeNavItem — dashboard active -->
      <!-- 工作台 (Dashboard) — ACTIVE -->
      <button
        class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
        data-nav-key="dashboard"
        data-active="true"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z" />
        </svg>
        <span style="font-size: var(--text-xs);">工作台</span>
      </button>

      <!-- 素材库 (Source Library) -->
      <a
        href="pages/source-library.html"
        id="nav-source"
        data-dom-id="nav-source"
        class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
        data-nav-key="source-library"
        data-active="false"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
        </svg>
        <span style="font-size: var(--text-xs);">素材库</span>
      </a>

      <!-- 周复盘 (Weekly Review) -->
      <a
        href="pages/weekly-review.html"
        id="nav-review"
        data-dom-id="nav-review"
        class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
        data-nav-key="weekly-review"
        data-active="false"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
        </svg>
        <span style="font-size: var(--text-xs);">周复盘</span>
      </a>

    </div>
  </nav>

  <!-- Guitar illustration fix: border-image + border-radius is unsupported, use gradient bg trick -->
    <style>
      /* Gradient border circles for guitar: use pseudo-element approach */
      .guitar-circle {
        position: relative;
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
      }
      .guitar-circle::before {
        content: '';
        position: absolute;
        inset: -2.5px;
        border-radius: inherit;
        background: var(--gradient-primary);
        z-index: -1;
      }
    </style>

    <!-- Tab State Styles + Interactions -->
    <style>
    [data-nav-key] svg,
    [data-nav-key] span {
      color: var(--text-tertiary);
      transition: color var(--transition-base);
    }

    [data-nav-key][data-active="true"] svg,
    [data-nav-key][data-active="true"] span {
      color: var(--color-primary);
    }

    #cta-add-source:hover {
      box-shadow: 0 6px 28px rgba(184, 156, 212, 0.30);
    }

    #cta-add-source:active {
      transform: scale(0.98);
    }

    #cta-add-source:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    [data-nav-key]:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: -2px;
      border-radius: var(--radius-md);
    }

    @media (prefers-reduced-motion: reduce) {
      #cta-add-source,
      [data-nav-key] svg,
      [data-nav-key] span {
        transition-duration: 0.01ms !important;
      }
    }
  </style>

  <script>lucide.createIcons();</script>
</body>
</html>
