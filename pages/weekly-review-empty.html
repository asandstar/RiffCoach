<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周复盘空状态</title>
    <style id="theme-vars">
:root {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-primary-light: rgba(184, 156, 212, 0.20);
  --color-primary-subtle: rgba(184, 156, 212, 0.08);
  --gradient-primary: linear-gradient(135deg, #C4A4D7 0%, #8BA4C7 100%);
  --color-warm-cream: #F5E6D0;
  --color-warm-cream-light: rgba(245, 230, 208, 0.25);
  --color-mint: #B8D8C8;
  --color-mint-light: rgba(184, 216, 200, 0.25);
  --color-lavender: #D4C4E8;
  --color-lavender-light: rgba(212, 196, 232, 0.30);
  --color-amber-soft: #F0D8A8;
  --color-amber-soft-light: rgba(240, 216, 168, 0.30);
  --color-rose-soft: #E8B8C4;
  --color-rose-soft-light: rgba(232, 184, 196, 0.30);
  --gradient-electric: linear-gradient(135deg, #FFF5E6 0%, #F0D8A8 100%);
  --gradient-acoustic: linear-gradient(135deg, #F0FAF5 0%, #B8D8C8 100%);
  --gradient-ukulele: linear-gradient(135deg, #F5F0FF 0%, #D4C4E8 100%);
  --state-error: #D4788A;
  --state-error-light: rgba(212, 120, 138, 0.18);
  --state-success: #7EBCA6;
  --state-success-light: rgba(126, 188, 166, 0.18);
  --state-warning: #E8C87A;
  --state-info: #8BA4C7;
  --bg-base: #F0EEF5;
  --bg-surface: rgba(255, 255, 255, 0.55);
  --bg-surface-elevated: rgba(255, 255, 255, 0.72);
  --bg-input: rgba(255, 255, 255, 0.60);
  --border-default: rgba(184, 156, 212, 0.20);
  --border-subtle: rgba(184, 156, 212, 0.10);
  --text-primary: #4A3F5C;
  --text-secondary: #7B6E94;
  --text-tertiary: #A99BBF;
  --text-on-primary: #FFFFFF;
  --font-sans: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-display: 4rem;
  --leading-tight: 1.3;
  --leading-normal: 1.55;
  --leading-relaxed: 1.7;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;
  --tracking-tight: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.03em;
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-blur: blur(16px);
  --glass-border: 1px solid rgba(255, 255, 255, 0.35);
  --shadow-static: 0 2px 8px rgba(74, 63, 92, 0.06);
  --shadow-elevated: 0 8px 24px rgba(74, 63, 92, 0.10);
  --shadow-float: 0 12px 32px rgba(74, 63, 92, 0.14);
  --shadow-glow: 0 4px 20px rgba(184, 156, 212, 0.20);
  --transition-fast: 200ms ease-out;
  --transition-base: 300ms ease-out;
  --transition-slow: 500ms ease-out;
}

@theme inline {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-background: #F0EEF5;
  --color-foreground: #4A3F5C;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: #ffffff; color: #0f172a; }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="background-color: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans);">
  <main id="page-weekly-review-empty" class="min-h-screen pb-[72px]">

    <!-- Header -->
    <div class="px-5 pt-[env(safe-area-inset-top,12px)]" style="padding-top: 16px; padding-bottom: var(--space-4);">
      <h1 style="font-size: var(--text-2xl); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); color: var(--text-primary); text-wrap: balance; word-break: keep-all;">周复盘</h1>
      <p style="color: var(--text-tertiary); font-family: var(--font-mono); font-size: var(--text-sm); letter-spacing: var(--tracking-wide); margin-top: var(--space-1);">2025.06.30 - 2025.07.06</p>
    </div>

    <!-- Empty message section -->
    <section class="flex flex-col items-center px-5" style="padding-top: 40px; padding-bottom: var(--space-8);">
      <!-- Bar chart icon 48px, --text-tertiary -->
      <svg width="48" height="48" fill="none" viewBox="0 0 48 48" aria-hidden="true" style="color: var(--text-tertiary); margin-bottom: var(--space-4);">
        <rect x="6" y="26" width="8" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <rect x="20" y="14" width="8" height="28" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <rect x="34" y="20" width="8" height="22" rx="2" stroke="currentColor" stroke-width="1.5"/>
      </svg>

      <h2 class="text-center" style="font-size: var(--text-lg); font-weight: var(--weight-semibold); color: var(--text-primary); margin-bottom: var(--space-2); text-wrap: balance; word-break: keep-all;">本周还没有练习记录</h2>
      <p class="text-center" style="font-size: var(--text-sm); color: var(--text-secondary); line-height: var(--leading-relaxed); max-width: 260px;">开始练习后，这里会显示你的本周总结</p>
    </section>

    <!-- CTA button — gradient-primary, rounded-full, shadow-glow -->
    <section class="flex justify-center px-5" style="margin-bottom: var(--space-12);">
      <a
        href="pages/dashboard.html"
        id="cta-go-practice"
        data-dom-id="cta-go-practice"
        class="inline-flex items-center justify-center whitespace-nowrap focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2"
        style="
          width: 100%;
          max-width: 200px;
          height: 48px;
          background: var(--gradient-primary);
          color: var(--text-on-primary);
          font-size: var(--text-base);
          font-weight: var(--weight-semibold);
          border-radius: var(--radius-full);
          outline-color: var(--color-primary);
          letter-spacing: var(--tracking-normal);
          box-shadow: var(--shadow-glow);
          transition: transform var(--transition-fast), box-shadow var(--transition-base);
        "
        role="button"
        onmouseenter="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 28px rgba(184, 156, 212, 0.30)'"
        onmouseleave="this.style.transform=''; this.style.boxShadow='var(--shadow-glow)'"
        onmousedown="this.style.transform='scale(0.98)'"
        onmouseup="this.style.transform=''"
      >去练习</a>
    </section>

    <!-- Example preview — faded glassmorphism at 0.25 opacity -->
    <section class="px-5" style="opacity: 0.25;">
      <span style="font-size: var(--text-sm); color: var(--text-tertiary); font-weight: var(--weight-medium); display: block; margin-bottom: var(--space-3);">示例</span>

      <!-- Faded stats card — glassmorphism -->
      <div style="
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        border: var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        margin-bottom: var(--space-4);
        display: flex;
        align-items: center;
        justify-content: space-around;
      ">
        <div class="flex flex-col items-center">
          <span style="font-family: var(--font-mono); font-size: var(--text-4xl); font-weight: var(--weight-bold); line-height: 1.1; color: var(--color-primary); font-variant-numeric: tabular-nums;">180</span>
          <span style="color: var(--text-secondary); font-size: var(--text-sm); margin-top: var(--space-1);">分钟</span>
        </div>
        <div style="width: 1px; height: 40px; background: var(--border-default);"></div>
        <div class="flex flex-col items-center">
          <span style="font-family: var(--font-mono); font-size: var(--text-3xl); font-weight: var(--weight-bold); line-height: 1.1; color: var(--text-secondary); font-variant-numeric: tabular-nums;">4</span>
          <span style="color: var(--text-tertiary); font-size: var(--text-sm); margin-top: var(--space-1);">天</span>
        </div>
      </div>

      <!-- Faded skill progress bars — glassmorphism -->
      <div style="
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        border: var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        margin-bottom: var(--space-4);
      ">
        <span style="font-size: var(--text-sm); color: var(--text-primary); font-weight: var(--weight-medium); display: block; margin-bottom: var(--space-3);">技能进度</span>

        <!-- Skill bar 1: 和弦转换 75% -->
        <div style="margin-bottom: var(--space-3);">
          <div class="flex items-center justify-between" style="margin-bottom: var(--space-1);">
            <span style="font-size: var(--text-xs); color: var(--text-secondary);">和弦转换</span>
            <span style="font-size: var(--text-xs); color: var(--text-tertiary); font-family: var(--font-mono);">75%</span>
          </div>
          <div style="width: 100%; height: 6px; background: var(--border-default); border-radius: var(--radius-full);">
            <div style="width: 75%; height: 6px; background: var(--gradient-primary); border-radius: var(--radius-full);"></div>
          </div>
        </div>

        <!-- Skill bar 2: 音阶跑动 60% -->
        <div style="margin-bottom: var(--space-3);">
          <div class="flex items-center justify-between" style="margin-bottom: var(--space-1);">
            <span style="font-size: var(--text-xs); color: var(--text-secondary);">音阶跑动</span>
            <span style="font-size: var(--text-xs); color: var(--text-tertiary); font-family: var(--font-mono);">60%</span>
          </div>
          <div style="width: 100%; height: 6px; background: var(--border-default); border-radius: var(--radius-full);">
            <div style="width: 60%; height: 6px; background: var(--gradient-primary); border-radius: var(--radius-full);"></div>
          </div>
        </div>

        <!-- Skill bar 3: 拨弦控制 45% -->
        <div>
          <div class="flex items-center justify-between" style="margin-bottom: var(--space-1);">
            <span style="font-size: var(--text-xs); color: var(--text-secondary);">拨弦控制</span>
            <span style="font-size: var(--text-xs); color: var(--text-tertiary); font-family: var(--font-mono);">45%</span>
          </div>
          <div style="width: 100%; height: 6px; background: var(--border-default); border-radius: var(--radius-full);">
            <div style="width: 45%; height: 6px; background: var(--gradient-primary); border-radius: var(--radius-full);"></div>
          </div>
        </div>
      </div>

      <!-- Faded pain point tags — glassmorphism -->
      <div style="
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        border: var(--glass-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
      ">
        <span style="font-size: var(--text-sm); color: var(--text-primary); font-weight: var(--weight-medium); display: block; margin-bottom: var(--space-3);">痛点标记</span>
        <div class="flex flex-wrap gap-2">
          <span style="font-size: var(--text-xs); padding: 4px 10px; border-radius: var(--radius-md); background: var(--state-error-light); color: var(--state-error);">和弦切换延迟</span>
          <span style="font-size: var(--text-xs); padding: 4px 10px; border-radius: var(--radius-md); background: var(--state-error-light); color: var(--state-error);">高把位不准</span>
          <span style="font-size: var(--text-xs); padding: 4px 10px; border-radius: var(--radius-md); background: var(--state-error-light); color: var(--state-error);">节奏不稳</span>
          <span style="font-size: var(--text-xs); padding: 4px 10px; border-radius: var(--radius-md); background: var(--state-error-light); color: var(--state-error);">拨弦力度</span>
        </div>
      </div>
    </section>

  </main>

  <!-- Bottom Tab Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 z-50" style="background: var(--bg-surface-elevated); backdrop-filter: var(--glass-blur); border-top: var(--glass-border); padding-bottom: env(safe-area-inset-bottom);">
    <div class="flex items-center justify-around h-[60px] max-w-[480px] mx-auto">

      <!-- SLOT: activeNavItem — weekly-review active -->
      <!-- 工作台 (Dashboard) -->
      <a
        href="pages/dashboard.html"
        id="nav-dashboard"
        data-dom-id="nav-dashboard"
        class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
        data-nav-key="dashboard"
        data-active="false"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z" />
        </svg>
        <span style="font-size: var(--text-xs);">工作台</span>
      </a>

      <!-- 素材库 (Source Library) -->
      <a
        href="pages/source-library.html"
        id="nav-source"
        data-dom-id="nav-source"
        class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
        data-nav-key="source-library"
        data-active="false"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
        </svg>
        <span style="font-size: var(--text-xs);">素材库</span>
      </a>

      <!-- 周复盘 (Weekly Review) — ACTIVE -->
      <button
        class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
        data-nav-key="weekly-review"
        data-active="true"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
        </svg>
        <span style="font-size: var(--text-xs);">周复盘</span>
      </button>

    </div>
  </nav>

  <!-- Tab State Styles + CTA Interactions -->
  <style>
    [data-nav-key] svg,
    [data-nav-key] span {
      color: var(--text-tertiary);
      transition: color var(--transition-base);
    }

    [data-nav-key][data-active="true"] svg,
    [data-nav-key][data-active="true"] span {
      color: var(--color-primary);
    }

    #cta-go-practice:hover {
      box-shadow: 0 6px 28px rgba(184, 156, 212, 0.30);
    }

    #cta-go-practice:active {
      transform: scale(0.98);
    }

    #cta-go-practice:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    [data-nav-key]:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: -2px;
      border-radius: var(--radius-md);
    }

    @media (prefers-reduced-motion: reduce) {
      #cta-go-practice,
      [data-nav-key] svg,
      [data-nav-key] span {
        transition-duration: 0.01ms !important;
      }
    }
  </style>

  <script>lucide.createIcons();</script>
</body>
</html>
