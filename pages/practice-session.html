<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习模式 — String Practice Compass</title>
    <style id="theme-vars">
:root {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-primary-light: rgba(184, 156, 212, 0.20);
  --color-primary-subtle: rgba(184, 156, 212, 0.08);
  --gradient-primary: linear-gradient(135deg, #C4A4D7 0%, #8BA4C7 100%);
  --color-warm-cream: #F5E6D0;
  --color-warm-cream-light: rgba(245, 230, 208, 0.25);
  --color-mint: #B8D8C8;
  --color-mint-light: rgba(184, 216, 200, 0.25);
  --color-lavender: #D4C4E8;
  --color-lavender-light: rgba(212, 196, 232, 0.30);
  --color-amber-soft: #F0D8A8;
  --color-amber-soft-light: rgba(240, 216, 168, 0.30);
  --color-rose-soft: #E8B8C4;
  --color-rose-soft-light: rgba(232, 184, 196, 0.30);
  --gradient-electric: linear-gradient(135deg, #FFF5E6 0%, #F0D8A8 100%);
  --gradient-acoustic: linear-gradient(135deg, #F0FAF5 0%, #B8D8C8 100%);
  --gradient-ukulele: linear-gradient(135deg, #F5F0FF 0%, #D4C4E8 100%);
  --state-error: #D4788A;
  --state-error-light: rgba(212, 120, 138, 0.18);
  --state-success: #7EBCA6;
  --state-success-light: rgba(126, 188, 166, 0.18);
  --state-warning: #E8C87A;
  --state-info: #8BA4C7;
  --bg-base: #F0EEF5;
  --bg-surface: rgba(255, 255, 255, 0.55);
  --bg-surface-elevated: rgba(255, 255, 255, 0.72);
  --bg-input: rgba(255, 255, 255, 0.60);
  --border-default: rgba(184, 156, 212, 0.20);
  --border-subtle: rgba(184, 156, 212, 0.10);
  --text-primary: #4A3F5C;
  --text-secondary: #7B6E94;
  --text-tertiary: #A99BBF;
  --text-on-primary: #FFFFFF;
  --font-sans: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-display: 4rem;
  --leading-tight: 1.3;
  --leading-normal: 1.55;
  --leading-relaxed: 1.7;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;
  --tracking-tight: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.03em;
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-blur: blur(16px);
  --glass-border: 1px solid rgba(255, 255, 255, 0.35);
  --shadow-static: 0 2px 8px rgba(74, 63, 92, 0.06);
  --shadow-elevated: 0 8px 24px rgba(74, 63, 92, 0.10);
  --shadow-float: 0 12px 32px rgba(74, 63, 92, 0.14);
  --shadow-glow: 0 4px 20px rgba(184, 156, 212, 0.20);
  --transition-fast: 200ms ease-out;
  --transition-base: 300ms ease-out;
  --transition-slow: 500ms ease-out;
}

@theme inline {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-background: #F0EEF5;
  --color-foreground: #4A3F5C;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: #ffffff; color: #0f172a; }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="font-family: var(--font-sans); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: var(--gradient-electric); min-height: 100vh; background-attachment: fixed;">

<main style="min-height: 100vh; display: flex; flex-direction: column; position: relative;">

  <!-- === Top Bar === -->
  <header style="display: flex; align-items: center; padding: 12px 16px; min-height: 56px; position: relative; z-index: 10;">
    <button class="btn-dream" data-dom-id="back-to-dashboard" aria-label="返回" style="display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: var(--radius-full); border: none; background: transparent; cursor: pointer; transition: transform var(--transition-fast);">
      <i data-lucide="chevron-left" style="width: 22px; height: 22px; color: var(--text-secondary);"></i>
    </button>
    <div style="flex: 1; text-align: center; min-width: 0; padding: 0 8px;">
      <h1 style="font-family: var(--font-sans); font-weight: 700; font-size: var(--text-lg); color: var(--text-primary); letter-spacing: var(--tracking-tight); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">基础和弦转换练习</h1>
      <p style="font-size: var(--text-xs); color: var(--text-tertiary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">JustinGuitar</p>
    </div>
    <div style="width: 36px;"></div>
  </header>

  <!-- === Scrollable Content === -->
  <div class="no-scrollbar" style="flex: 1; overflow-y: auto; padding: 0 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 16px));">

    <!-- === Central Timer === -->
    <section style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 0 40px;">
      <div style="font-family: var(--font-mono); font-weight: 700; font-size: 64px; line-height: 1; letter-spacing: 0.04em; color: var(--text-primary); text-align: center;">
        <span>05</span><span class="timer-colon" style="animation: colonPulse 2s ease-in-out infinite;">:</span><span>23</span>
      </div>
      <p class="spc-label" style="margin-top: 14px; text-transform: none; letter-spacing: 0; font-size: var(--text-sm); color: var(--text-tertiary);">练习时长</p>
    </section>

    <!-- === Control Buttons === -->
    <section style="display: flex; align-items: center; justify-content: center; gap: 24px; padding-bottom: 36px;">
      <!-- Pause -->
      <button class="btn-dream" aria-label="暂停" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: var(--radius-full); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); cursor: pointer; transition: transform var(--transition-fast); box-shadow: var(--shadow-static);">
        <i data-lucide="pause" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
      </button>
      <!-- Play (center, larger) -->
      <button class="btn-dream play-btn-anim" aria-label="开始" style="display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: var(--radius-full); background: var(--gradient-primary); border: none; cursor: pointer; transition: transform var(--transition-fast); box-shadow: var(--shadow-glow); animation: softPulse 3s ease-in-out infinite;">
        <i data-lucide="play" style="width: 24px; height: 24px; color: var(--text-on-primary); margin-left: 2px;"></i>
      </button>
      <!-- Reset -->
      <button class="btn-dream" aria-label="重置" style="display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: var(--radius-full); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); cursor: pointer; transition: transform var(--transition-fast); box-shadow: var(--shadow-static);">
        <i data-lucide="rotate-ccw" style="width: 18px; height: 18px; color: var(--text-secondary);"></i>
      </button>
    </section>

    <!-- === BPM Section === -->
    <section style="display: flex; flex-direction: column; align-items: center; padding-bottom: 32px;">
      <p style="font-family: var(--font-sans); font-weight: 500; font-size: var(--text-xs); color: var(--text-tertiary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px;">当前 BPM</p>
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="btn-dream" aria-label="减少 BPM" style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; min-width: 32px; border-radius: var(--radius-full); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); cursor: pointer; transition: transform var(--transition-fast); box-shadow: var(--shadow-static);">
          <i data-lucide="minus" style="width: 14px; height: 14px; color: var(--text-secondary);"></i>
        </button>
        <span style="font-family: var(--font-mono); font-weight: 700; font-size: 28px; line-height: 1; min-width: 48px; text-align: center; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">80</span>
        <button class="btn-dream" aria-label="增加 BPM" style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; min-width: 32px; border-radius: var(--radius-full); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); cursor: pointer; transition: transform var(--transition-fast); box-shadow: var(--shadow-static);">
          <i data-lucide="plus" style="width: 14px; height: 14px; color: var(--text-secondary);"></i>
        </button>
      </div>
    </section>

    <!-- === Repetition Counter === -->
    <section style="display: flex; flex-direction: column; align-items: center; padding-bottom: 32px;">
      <p style="font-family: var(--font-sans); font-weight: 500; font-size: var(--text-xs); color: var(--text-tertiary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px;">重复次数</p>
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="btn-dream" aria-label="减少次数" style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; min-width: 32px; border-radius: var(--radius-full); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); cursor: pointer; transition: transform var(--transition-fast); box-shadow: var(--shadow-static);">
          <i data-lucide="minus" style="width: 14px; height: 14px; color: var(--text-secondary);"></i>
        </button>
        <span style="font-family: var(--font-mono); font-weight: 600; font-size: var(--text-xl); line-height: 1; min-width: 72px; text-align: center; color: var(--text-primary); white-space: nowrap;">3 / 10</span>
        <button class="btn-dream" aria-label="增加次数" style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; min-width: 32px; border-radius: var(--radius-full); background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); cursor: pointer; transition: transform var(--transition-fast); box-shadow: var(--shadow-static);">
          <i data-lucide="plus" style="width: 14px; height: 14px; color: var(--text-secondary);"></i>
        </button>
      </div>
      <!-- Thin gradient progress bar -->
      <div style="width: 100%; max-width: 200px; margin-top: 12px; height: 3px; border-radius: var(--radius-full); background: var(--border-default); overflow: hidden;">
        <div style="width: 30%; height: 100%; border-radius: var(--radius-full); background: var(--gradient-primary);"></div>
      </div>
    </section>

    <!-- === Self-Assessment Card (Glassmorphism) === -->
    <section style="background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-static);">
      <p style="font-family: var(--font-sans); font-weight: 500; font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: 12px; text-transform: none; letter-spacing: 0;">自我评价</p>
      <div style="display: flex; align-items: center; gap: 10px;">
        <!-- 3 Filled stars (cute rounded style) -->
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-label="1星" style="flex-shrink: 0;">
          <defs><linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C4A4D7"/><stop offset="100%" stop-color="#8BA4C7"/></linearGradient></defs>
          <path d="M12 2.5l2.35 4.76 5.25.77-3.8 3.7.9 5.22L12 14.27l-4.7 2.47.9-5.22-3.8-3.7 5.25-.77L12 2.5z" fill="url(#starGrad)" stroke="url(#starGrad)" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-label="2星" style="flex-shrink: 0;">
          <path d="M12 2.5l2.35 4.76 5.25.77-3.8 3.7.9 5.22L12 14.27l-4.7 2.47.9-5.22-3.8-3.7 5.25-.77L12 2.5z" fill="url(#starGrad)" stroke="url(#starGrad)" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-label="3星" style="flex-shrink: 0;">
          <path d="M12 2.5l2.35 4.76 5.25.77-3.8 3.7.9 5.22L12 14.27l-4.7 2.47.9-5.22-3.8-3.7 5.25-.77L12 2.5z" fill="url(#starGrad)" stroke="url(#starGrad)" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
        <!-- 2 Empty stars -->
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-label="4星" style="flex-shrink: 0;">
          <path d="M12 2.5l2.35 4.76 5.25.77-3.8 3.7.9 5.22L12 14.27l-4.7 2.47.9-5.22-3.8-3.7 5.25-.77L12 2.5z" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-label="5星" style="flex-shrink: 0;">
          <path d="M12 2.5l2.35 4.76 5.25.77-3.8 3.7.9 5.22L12 14.27l-4.7 2.47.9-5.22-3.8-3.7 5.25-.77L12 2.5z" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </div>
    </section>

    <!-- === Pain Point Tags === -->
    <section style="margin-bottom: 16px;">
      <p style="font-family: var(--font-sans); font-weight: 500; font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: 10px; text-transform: none; letter-spacing: 0;">今天遇到的问题</p>
      <div style="display: flex; flex-wrap: wrap; gap: 8px;">
        <!-- Selected: 手指僵硬 -->
        <button class="btn-dream" style="display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; border-radius: var(--radius-full); padding: 6px 14px; background: var(--state-error-light); border: none; color: var(--state-error); font-size: var(--text-sm); font-family: var(--font-sans); font-weight: 500; cursor: pointer; transition: transform var(--transition-fast), background-color var(--transition-base), color var(--transition-base);">手指僵硬</button>
        <!-- Selected: 节奏不稳 -->
        <button class="btn-dream" style="display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; border-radius: var(--radius-full); padding: 6px 14px; background: var(--state-error-light); border: none; color: var(--state-error); font-size: var(--text-sm); font-family: var(--font-sans); font-weight: 500; cursor: pointer; transition: transform var(--transition-fast), background-color var(--transition-base), color var(--transition-base);">节奏不稳</button>
        <!-- Unselected: 换和弦慢 -->
        <button class="btn-dream" style="display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; border-radius: var(--radius-full); padding: 6px 14px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); color: var(--text-secondary); font-size: var(--text-sm); font-family: var(--font-sans); font-weight: 500; cursor: pointer; transition: transform var(--transition-fast), background-color var(--transition-base), color var(--transition-base);">换和弦慢</button>
        <!-- Unselected: 其他 -->
        <button class="btn-dream" style="display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; border-radius: var(--radius-full); padding: 6px 14px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); color: var(--text-secondary); font-size: var(--text-sm); font-family: var(--font-sans); font-weight: 500; cursor: pointer; transition: transform var(--transition-fast), background-color var(--transition-base), color var(--transition-base);">其他</button>
      </div>
    </section>

    <!-- === Notes Textarea (Glassmorphism) === -->
    <section style="margin-bottom: 20px;">
      <textarea rows="3" placeholder="写点什么吧~" style="width: 100%; resize: none; border-radius: var(--radius-xl); padding: 14px 16px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); color: var(--text-primary); font-family: var(--font-sans); font-size: var(--text-base); line-height: var(--leading-normal); outline: none; box-shadow: var(--shadow-static); transition: border-color var(--transition-base), box-shadow var(--transition-base);"></textarea>
    </section>

    <!-- === Complete Practice Button (full-width, bottom) === -->
    <section>
      <button data-dom-id="complete-to-review" class="btn-dream" style="display: flex; align-items: center; justify-content: center; width: 100%; height: 52px; border-radius: var(--radius-lg); background: var(--gradient-primary); border: none; color: var(--text-on-primary); font-family: var(--font-sans); font-size: var(--text-base); font-weight: 600; letter-spacing: 0.02em; cursor: pointer; box-shadow: var(--shadow-glow); transition: transform var(--transition-fast);">
        完成练习 ✨
      </button>
    </section>

  </div>

</main>

<script>lucide.createIcons();</script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
      /* Dreamy colon pulse animation — slow 2s cycle */
      @keyframes colonPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.25; }
      }
      /* Soft pulse for play button */
      @keyframes softPulse {
        0%, 100% { box-shadow: 0 4px 20px rgba(184, 156, 212, 0.20); }
        50% { box-shadow: 0 6px 28px rgba(184, 156, 212, 0.35); }
      }
      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .timer-colon, .play-btn-anim { animation-duration: 0.01ms !important; }
        * { transition-duration: 0.01ms !important; }
      }
      /* Touch devices: disable hover transitions */
      @media (hover: none) {
        .btn-dream:hover { transform: none !important; }
      }
      /* Focus visible */
      button:focus-visible, textarea:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }
      textarea:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px var(--color-primary-light);
      }
      /* Button press interactions */
      .btn-dream:active {
        transform: scale(0.93) !important;
      }
    </style>
</body>
</html>
