<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材库空状态</title>
    <style id="theme-vars">
:root {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-primary-light: rgba(184, 156, 212, 0.20);
  --color-primary-subtle: rgba(184, 156, 212, 0.08);
  --gradient-primary: linear-gradient(135deg, #C4A4D7 0%, #8BA4C7 100%);
  --color-warm-cream: #F5E6D0;
  --color-warm-cream-light: rgba(245, 230, 208, 0.25);
  --color-mint: #B8D8C8;
  --color-mint-light: rgba(184, 216, 200, 0.25);
  --color-lavender: #D4C4E8;
  --color-lavender-light: rgba(212, 196, 232, 0.30);
  --color-amber-soft: #F0D8A8;
  --color-amber-soft-light: rgba(240, 216, 168, 0.30);
  --color-rose-soft: #E8B8C4;
  --color-rose-soft-light: rgba(232, 184, 196, 0.30);
  --gradient-electric: linear-gradient(135deg, #FFF5E6 0%, #F0D8A8 100%);
  --gradient-acoustic: linear-gradient(135deg, #F0FAF5 0%, #B8D8C8 100%);
  --gradient-ukulele: linear-gradient(135deg, #F5F0FF 0%, #D4C4E8 100%);
  --state-error: #D4788A;
  --state-error-light: rgba(212, 120, 138, 0.18);
  --state-success: #7EBCA6;
  --state-success-light: rgba(126, 188, 166, 0.18);
  --state-warning: #E8C87A;
  --state-info: #8BA4C7;
  --bg-base: #F0EEF5;
  --bg-surface: rgba(255, 255, 255, 0.55);
  --bg-surface-elevated: rgba(255, 255, 255, 0.72);
  --bg-input: rgba(255, 255, 255, 0.60);
  --border-default: rgba(184, 156, 212, 0.20);
  --border-subtle: rgba(184, 156, 212, 0.10);
  --text-primary: #4A3F5C;
  --text-secondary: #7B6E94;
  --text-tertiary: #A99BBF;
  --text-on-primary: #FFFFFF;
  --font-sans: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-base: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 1.875rem;
  --text-4xl: 2.25rem;
  --text-display: 4rem;
  --leading-tight: 1.3;
  --leading-normal: 1.55;
  --leading-relaxed: 1.7;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;
  --tracking-tight: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.03em;
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-blur: blur(16px);
  --glass-border: 1px solid rgba(255, 255, 255, 0.35);
  --shadow-static: 0 2px 8px rgba(74, 63, 92, 0.06);
  --shadow-elevated: 0 8px 24px rgba(74, 63, 92, 0.10);
  --shadow-float: 0 12px 32px rgba(74, 63, 92, 0.14);
  --shadow-glow: 0 4px 20px rgba(184, 156, 212, 0.20);
  --transition-fast: 200ms ease-out;
  --transition-base: 300ms ease-out;
  --transition-slow: 500ms ease-out;
}

@theme inline {
  --color-primary: #B89CD4;
  --color-primary-hover: #A488C0;
  --color-background: #F0EEF5;
  --color-foreground: #4A3F5C;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: #ffffff; color: #0f172a; }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="font-family: var(--font-sans);">

<!-- App Frame -->
<div id="page-source-library-empty" class="min-h-screen" style="background-color: var(--bg-base); padding-bottom: 72px;">

  <!-- Page Header -->
  <header class="px-5 pt-[env(safe-area-inset-top,12px)]" style="padding-top: 16px; padding-bottom: var(--space-4);">
    <h1 class="spc-title" style="font-size: var(--text-2xl); line-height: var(--leading-tight); word-break: keep-all; overflow-wrap: break-word;">素材库</h1>
    <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-top: var(--space-1);">管理你的练习来源</p>
  </header>

  <!-- SLOT: pageContent -->
  <main class="px-5">
    <!-- Empty State Content -->
    <div class="flex flex-col items-center justify-center" style="padding-top: 56px; padding-bottom: 36px;">

      <!-- Book/Music Icon — 48px, --text-tertiary -->
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--text-tertiary);" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
      </svg>

      <!-- Empty Message -->
      <p style="font-size: var(--text-lg); color: var(--text-primary); font-weight: var(--weight-semibold); margin-top: var(--space-6); text-align: center; word-break: keep-all; overflow-wrap: break-word;">还没有添加任何课程或书籍</p>

      <!-- Subtitle -->
      <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-top: var(--space-2); text-align: center;">从以下渠道添加你的学习内容</p>

    </div>

    <!-- Quick-Add Buttons — stacked glassmorphism cards -->
    <div class="flex flex-col gap-3" style="max-width: 375px;">

      <!-- 从 B站 添加 — play icon, gradient-primary color -->
      <button
        class="quick-add-btn flex items-center gap-3 w-full"
        style="
          height: 52px;
          padding: 0 var(--space-4);
          background: var(--glass-bg);
          backdrop-filter: var(--glass-blur);
          border: var(--glass-border);
          border-radius: var(--radius-lg);
          transition: transform var(--transition-fast), border-color var(--transition-base);
        "
        onmousedown="this.style.transform='scale(0.97)'"
        onmouseup="this.style.transform=''"
        onmouseleave="this.style.transform=''"
        onfocus="this.style.borderColor='var(--color-primary)'"
        onblur="this.style.borderColor=''"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-primary); flex-shrink: 0;" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" />
        </svg>
        <span style="font-size: var(--text-base); color: var(--text-primary); font-weight: var(--weight-medium);">从 B站 添加</span>
      </button>

      <!-- 从 YouTube 添加 — external-link icon -->
      <button
        class="quick-add-btn flex items-center gap-3 w-full"
        style="
          height: 52px;
          padding: 0 var(--space-4);
          background: var(--glass-bg);
          backdrop-filter: var(--glass-blur);
          border: var(--glass-border);
          border-radius: var(--radius-lg);
          transition: transform var(--transition-fast), border-color var(--transition-base);
        "
        onmousedown="this.style.transform='scale(0.97)'"
        onmouseup="this.style.transform=''"
        onmouseleave="this.style.transform=''"
        onfocus="this.style.borderColor='var(--color-primary)'"
        onblur="this.style.borderColor=''"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-primary); flex-shrink: 0;" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
        </svg>
        <span style="font-size: var(--text-base); color: var(--text-primary); font-weight: var(--weight-medium);">从 YouTube 添加</span>
      </button>

      <!-- 手动输入课程 — edit icon -->
      <button
        class="quick-add-btn flex items-center gap-3 w-full"
        style="
          height: 52px;
          padding: 0 var(--space-4);
          background: var(--glass-bg);
          backdrop-filter: var(--glass-blur);
          border: var(--glass-border);
          border-radius: var(--radius-lg);
          transition: transform var(--transition-fast), border-color var(--transition-base);
        "
        onmousedown="this.style.transform='scale(0.97)'"
        onmouseup="this.style.transform=''"
        onmouseleave="this.style.transform=''"
        onfocus="this.style.borderColor='var(--color-primary)'"
        onblur="this.style.borderColor=''"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-primary); flex-shrink: 0;" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
        </svg>
        <span style="font-size: var(--text-base); color: var(--text-primary); font-weight: var(--weight-medium);">手动输入课程</span>
      </button>

    </div>

  </main>

</div>

<!-- Bottom Tab Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50" style="background: var(--bg-surface-elevated); backdrop-filter: var(--glass-blur); border-top: var(--glass-border); padding-bottom: env(safe-area-inset-bottom);">
    <div class="flex items-center justify-around h-[60px] max-w-[480px] mx-auto">

    <!-- 工作台 (Dashboard) -->
    <a
      href="pages/dashboard.html"
      id="nav-dashboard"
      data-dom-id="nav-dashboard"
      class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
      data-nav-key="dashboard"
      data-active="false"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z" />
      </svg>
      <span style="font-size: var(--text-xs);">工作台</span>
    </a>

    <!-- 素材库 (Source Library) — ACTIVE -->
    <button
      class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
      data-nav-key="source-library"
      data-active="true"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
      </svg>
      <span style="font-size: var(--text-xs);">素材库</span>
    </button>

    <!-- 周复盘 (Weekly Review) -->
    <a
      href="pages/weekly-review.html"
      id="nav-review"
      data-dom-id="nav-review"
      class="flex flex-col items-center justify-center gap-[2px] w-full h-full"
      data-nav-key="weekly-review"
      data-active="false"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
      </svg>
      <span style="font-size: var(--text-xs);">周复盘</span>
    </a>

  </div>
</nav>

<!-- Tab State Styles + Button Interactions -->
<style>
  [data-nav-key] svg,
  [data-nav-key] span {
    color: var(--text-tertiary);
    transition: color var(--transition-base);
  }

  [data-nav-key][data-active="true"] svg,
  [data-nav-key][data-active="true"] span {
    color: var(--color-primary);
  }

  .quick-add-btn:hover {
    border-color: var(--color-primary);
  }

  .quick-add-btn:active {
    transform: scale(0.97);
  }

  .quick-add-btn:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  [data-nav-key]:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: -2px;
    border-radius: var(--radius-md);
  }

  @media (prefers-reduced-motion: reduce) {
    .quick-add-btn,
    [data-nav-key] svg,
    [data-nav-key] span {
      transition-duration: 0.01ms !important;
    }
  }
</style>

<script>lucide.createIcons();</script>

</body>
</html>
